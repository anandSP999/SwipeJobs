<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Pro Invoice Manager</title>
    
    <!-- Tailwind CSS for Mobile Optimization -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tesseract.js for AI Fast Scanning -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f4f6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .print-view { background: white; padding: 20px; max-width: 800px; margin: 0 auto; border: 1px solid #ccc; }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .print-view { border: none; box-shadow: none; width: 100%; font-size: 12px;}
        }
    </style>
</head>
<body>

    <!-- =========================
         1. MAIN APP DASHBOARD
         ========================= -->
    <div id="appView" class="min-h-screen p-2 md:p-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- Left Panel: Universal Scanner & Form -->
            <div class="bg-white p-5 rounded-xl shadow-md border-t-4 border-blue-600">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold text-gray-800">Universal Invoice Scanner</h2>
                </div>
                
                <!-- Fast Scan Buttons -->
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="relative bg-blue-50 border border-blue-200 border-dashed rounded p-3 text-center hover:bg-blue-100 cursor-pointer transition">
                        <label class="cursor-pointer block">
                            <span class="text-blue-700 font-bold block text-sm mb-1">📸 Camera Scan</span>
                            <input type="file" accept="image/*" capture="environment" class="hidden" id="cameraInput">
                        </label>
                    </div>
                    <div class="relative bg-green-50 border border-green-200 border-dashed rounded p-3 text-center hover:bg-green-100 cursor-pointer transition">
                        <label class="cursor-pointer block">
                            <span class="text-green-700 font-bold block text-sm mb-1">📁 Upload Invoice</span>
                            <input type="file" accept="image/*" class="hidden" id="fileInput">
                        </label>
                    </div>
                </div>

                <div id="statusBox" class="hidden flex items-center justify-center space-x-2 mb-4 p-2 bg-yellow-50 text-yellow-700 rounded text-sm font-bold">
                    <div class="loader" id="spinner"></div>
                    <span id="statusText">AI analyzing document layout...</span>
                </div>

                <!-- Universal Invoice Form -->
                <form id="invoiceForm" class="space-y-4">
                    <input type="hidden" id="editId" value="">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-500 uppercase">Supplier / Exporter (Company)</label>
                            <input type="text" id="companyName" class="w-full border-b-2 border-gray-300 focus:border-blue-500 p-2 outline-none font-bold text-gray-800 bg-gray-50" placeholder="Detected Company Name">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Invoice No.</label>
                            <input type="text" id="invNo" class="w-full border-b-2 border-gray-300 focus:border-blue-500 p-2 outline-none text-sm text-gray-800 font-semibold" placeholder="e.g. INV2025-08">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Date</label>
                            <input type="text" id="invDate" class="w-full border-b-2 border-gray-300 focus:border-blue-500 p-2 outline-none text-sm text-gray-800 font-semibold" placeholder="DD/MM/YYYY">
                        </div>
                        
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-500 uppercase">Consignee / Billed To (Customer)</label>
                            <textarea id="billedTo" rows="2" class="w-full border rounded p-2 outline-none focus:border-blue-500 text-sm text-gray-800 bg-gray-50" placeholder="Customer details will appear here..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Tax ID / GSTIN</label>
                            <input type="text" id="taxId" class="w-full border-b-2 border-gray-300 focus:border-blue-500 p-2 outline-none text-sm text-gray-800" placeholder="Optional">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Total Amount</label>
                            <input type="text" id="totalAmount" class="w-full border-b-2 border-gray-300 focus:border-blue-500 p-2 outline-none font-bold text-green-600 text-lg" placeholder="e.g. 12000">
                        </div>
                    </div>
                    
                    <div class="flex space-x-3 mt-4">
                        <button type="button" onclick="saveData()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded shadow hover:bg-blue-700 transition" id="saveBtn">
                            Save Data securely
                        </button>
                        <button type="button" onclick="cancelEdit()" class="hidden bg-red-100 text-red-700 font-bold py-3 px-4 rounded shadow hover:bg-red-200" id="cancelBtn">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Right Panel: Smart Grouped Database -->
            <div class="bg-white p-5 rounded-xl shadow-md flex flex-col border-t-4 border-gray-800">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold text-gray-800">Master Database</h2>
                    <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded">Local Storage</span>
                </div>
                <div class="overflow-y-auto flex-grow h-[36rem]">
                    <div id="companyDatabases" class="space-y-5">
                        <!-- Grouped lists inject here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- =========================
         JAVASCRIPT LOGIC
         ========================= -->
    <script>
        window.onload = function() {
            renderGroupedData();
        };

        // ==========================================
        // 1. SMART OCR SCANNING ENGINE
        // ==========================================
        document.getElementById('cameraInput').addEventListener('change', handleScan);
        document.getElementById('fileInput').addEventListener('change', handleScan);

        function handleScan(e) {
            const file = e.target.files[0];
            if(!file) return;

            const statusBox = document.getElementById('statusBox');
            statusBox.classList.remove('hidden');
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('statusText').innerText = 'Extracting dynamic data...';

            Tesseract.recognize(file, 'eng', { logger: m => console.log(m.status) })
            .then(({ data: { text } }) => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').innerText = 'Data Extracted Successfully!';
                
                extractDynamicData(text);

                setTimeout(() => statusBox.classList.add('hidden'), 3000);
            }).catch(err => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').innerText = 'Scan Failed. Try clearer image.';
            });
        }

        // --- UNIVERSAL REGEX EXTRACTOR ---
        function extractDynamicData(rawText) {
            console.log("Raw OCR:", rawText); // For debugging in console
            
            // 1. Invoice Number (Catches: Invoice No:, Inv.No, Invoice #, Invoice)
            let invMatch = rawText.match(/(?:Invoice|Inv)\s*(?:no|num|#|\.)?\s*[:\-]?\s*([A-Z0-9\-\/]+)/i);
            if (invMatch) document.getElementById('invNo').value = invMatch[1].trim();

            // 2. Date (Catches: Date:, Due Date, DD/MM/YYYY, DD-MM-YYYY, Aug 10, 2025)
            let dateMatch = rawText.match(/(?:Date|Dt\.?)[\s\.:]*(\d{1,2}[-\/\.]\d{1,2}[-\/\.]\d{2,4}|[A-Za-z]+\s\d{1,2},?\s\d{4})/i);
            if (dateMatch) document.getElementById('invDate').value = dateMatch[1].trim();

            // 3. Amount (Catches: Total Amount, Bill Amount, $, EUR, EUR 38.00, $12,000)
            // Advanced regex to find the biggest number near 'Total' or currency symbols
            let amountMatch = rawText.match(/(?:Total(?: Amount)?|Bill Amount)[\s:Rs\.]*([\d,\.]+)/i);
            if (!amountMatch) {
                amountMatch = rawText.match(/[\$€£]|EUR\s*([\d,\.]+)/i);
            }
            if (amountMatch) document.getElementById('totalAmount').value = amountMatch[1].trim();

            // 4. Tax ID / GSTIN
            let taxMatch = rawText.match(/(?:GSTIN|GST|VAT|Tax ID)\s*[:\-]?\s*([0-9A-Z]{15})/i);
            if (taxMatch) document.getElementById('taxId').value = taxMatch[1].trim();

            // 5. Company Name (Heuristic: First prominent non-empty line or near 'Exporter')
            let lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 3);
            let company = "";
            
            // Try to find Exporter/Shipper specific to export invoices
            let exporterIndex = lines.findIndex(l => l.toUpperCase().includes('EXPORTER') || l.toUpperCase().includes('SHIPPER'));
            if (exporterIndex > -1 && lines[exporterIndex + 1]) {
                company = lines[exporterIndex + 1];
            } 
            // Fallback: First major text block usually is the company name
            else if (lines.length > 0) {
                // Skip generic headers
                for(let i=0; i<lines.length; i++) {
                    if(!lines[i].toUpperCase().includes('INVOICE') && !lines[i].toUpperCase().includes('NAMAH')) {
                        company = lines[i];
                        break;
                    }
                }
            }
            document.getElementById('companyName').value = company.replace(/[^a-zA-Z0-9\s]/g, '');

            // 6. Consignee / Billed To
            let billedToIndex = lines.findIndex(l => l.toUpperCase().includes('CONSIGNEE') || l.toUpperCase().includes('BILLED TO') || l.toUpperCase().includes('BUYER'));
            if (billedToIndex > -1) {
                // Grab next 2-3 lines for address
                let address = [];
                for(let i=1; i<=3; i++) {
                    if(lines[billedToIndex + i] && !lines[billedToIndex + i].toUpperCase().includes('INVOICE')) {
                        address.push(lines[billedToIndex + i]);
                    }
                }
                document.getElementById('billedTo').value = address.join(', ');
            }
        }

        // ==========================================
        // 2. CRUD LOGIC (Grouped Database)
        // ==========================================
        function saveData() {
            const idInput = document.getElementById('editId').value;
            const data = {
                id: idInput ? parseInt(idInput) : Date.now(),
                company: document.getElementById('companyName').value.trim() || "UNKNOWN COMPANY",
                invNo: document.getElementById('invNo').value || "N/A",
                date: document.getElementById('invDate').value || "N/A",
                billedTo: document.getElementById('billedTo').value,
                taxId: document.getElementById('taxId').value,
                amount: document.getElementById('totalAmount').value || "0.00"
            };

            if(data.invNo === "N/A" && data.company === "UNKNOWN COMPANY") {
                return alert("Please ensure at least Company or Invoice Number is filled.");
            }

            let records = JSON.parse(localStorage.getItem('universalInvoices')) || [];
            
            if(idInput) {
                const index = records.findIndex(r => r.id === data.id);
                if(index > -1) records[index] = data;
                cancelEdit();
            } else {
                records.push(data);
            }

            localStorage.setItem('universalInvoices', JSON.stringify(records));
            document.getElementById('invoiceForm').reset();
            renderGroupedData();
        }

        function renderGroupedData() {
            const list = document.getElementById('companyDatabases');
            let records = JSON.parse(localStorage.getItem('universalInvoices')) || [];
            list.innerHTML = '';

            if(records.length === 0) {
                list.innerHTML = `
                <div class="text-center py-10">
                    <p class="text-gray-400 font-bold text-lg">No Records Found</p>
                    <p class="text-xs text-gray-400">Scan any invoice to automatically create a database.</p>
                </div>`;
                return;
            }

            // Grouping Logic
            const grouped = records.reduce((acc, obj) => {
                let key = obj.company.toUpperCase();
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            for (const [companyName, invoices] of Object.entries(grouped)) {
                
                // Sort by ID (newest first)
                invoices.sort((a, b) => b.id - a.id);

                let totalCompanyAmount = invoices.reduce((sum, inv) => {
                    let num = parseFloat(inv.amount.replace(/[^0-9.-]+/g,""));
                    return sum + (isNaN(num) ? 0 : num);
                }, 0);

                let companyHTML = `
                <div class="bg-gray-50 rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-800 p-3 text-white flex justify-between items-center">
                        <h3 class="font-bold tracking-wider uppercase text-sm w-3/4 truncate">🏢 ${companyName}</h3>
                        <span class="text-xs bg-gray-600 px-2 py-1 rounded">${invoices.length} Files</span>
                    </div>
                    <div class="p-3 bg-gray-100 flex justify-between text-xs font-bold text-gray-600 border-b">
                        <span>Total Tracked Volume:</span>
                        <span class="text-blue-600">${totalCompanyAmount.toFixed(2)}</span>
                    </div>
                    <div class="p-2 space-y-2 max-h-60 overflow-y-auto">`;

                invoices.forEach(inv => {
                    companyHTML += `
                        <div class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col md:flex-row justify-between md:items-center hover:border-blue-300 transition">
                            <div class="w-full md:w-2/3">
                                <p class="font-bold text-gray-800 text-sm">Inv: <span class="text-blue-600">${inv.invNo}</span></p>
                                <p class="text-xs text-gray-500 mt-1">Date: ${inv.date} | To: <span class="truncate">${inv.billedTo.substring(0, 20)}...</span></p>
                            </div>
                            <div class="w-full md:w-1/3 flex flex-col items-end mt-2 md:mt-0">
                                <span class="font-bold text-green-600 mb-2">${inv.amount}</span>
                                <div class="flex space-x-2">
                                    <button onclick="editRecord(${inv.id})" class="text-blue-500 hover:text-blue-700 font-bold text-xs">Edit</button>
                                    <span class="text-gray-300">|</span>
                                    <button onclick="deleteRecord(${inv.id})" class="text-red-500 hover:text-red-700 font-bold text-xs">Delete</button>
                                </div>
                            </div>
                        </div>`;
                });

                companyHTML += `</div></div>`;
                list.innerHTML += companyHTML;
            }
        }

        // ==========================================
        // 3. EDIT & DELETE ACTIONS
        // ==========================================
        function editRecord(id) {
            let records = JSON.parse(localStorage.getItem('universalInvoices')) || [];
            let record = records.find(r => r.id === id);
            if(record) {
                document.getElementById('editId').value = record.id;
                document.getElementById('companyName').value = record.company;
                document.getElementById('invNo').value = record.invNo;
                document.getElementById('invDate').value = record.date;
                document.getElementById('billedTo').value = record.billedTo;
                document.getElementById('taxId').value = record.taxId;
                document.getElementById('totalAmount').value = record.amount;
                
                document.getElementById('saveBtn').innerText = "Update Record";
                document.getElementById('cancelBtn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function cancelEdit() {
            document.getElementById('editId').value = '';
            document.getElementById('invoiceForm').reset();
            document.getElementById('saveBtn').innerText = "Save Data securely";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function deleteRecord(id) {
            if(confirm("Permanently delete this invoice record?")) {
                let records = JSON.parse(localStorage.getItem('universalInvoices')) || [];
                records = records.filter(r => r.id !== id);
                localStorage.setItem('universalInvoices', JSON.stringify(records));
                renderGroupedData();
            }
        }
    </script>
</body>
</html>
