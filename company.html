<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwipeJobs - Employer Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --c-primary: #0056b3; --c-bg: #f0f2f5; --c-sidebar: #1a252f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--c-bg); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { background: var(--c-sidebar); color: white; width: 260px; display: flex; flex-direction: column; z-index: 50; }
        .sidebar-header { padding: 25px 20px; background: #0f171e; text-align: center; font-size: 20px; font-weight: bold; color: #4da3ff; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #aaa; display: flex; align-items: center; gap: 15px; }
        .nav-item.active-tab { background: var(--c-primary); color: white; border-left: 5px solid #4da3ff; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .screen.active { display: block; }
        
        #auth-screen { display: flex; justify-content: center; align-items: center; background: white; height: 100vh; width: 100%; position: absolute; z-index: 100; }
        .auth-box { width: 90%; max-width: 400px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 15px; border-top: 5px solid var(--c-primary); }
        
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; }
        button { background-color: var(--c-primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        
        .modal { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; }

        .help-fab { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; background: #ff9f43; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; z-index: 90; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; flex-direction: row; position: fixed; bottom: 0; }
            .sidebar-header { display: none; }
            .nav-item { flex: 1; padding: 10px; font-size: 10px; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="text-align:center; margin-bottom:20px;">Company Portal</h2>
            <input type="email" id="c-login-email" placeholder="Email">
            <input type="password" id="c-login-pass" placeholder="Password">
            <button onclick="loginCompany()">Login</button>
            <button onclick="openRegStep1()" style="background:#444; margin-top:10px;">New Account</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="reg-step1" class="modal"><div class="modal-content">
        <h3>Step 1: Account Setup</h3><br>
        <input type="email" id="reg-email" placeholder="Official Email">
        <input type="password" id="reg-pass" placeholder="Password">
        <button onclick="goToRegStep2()">Next</button>
    </div></div>

    <div id="reg-step2" class="modal"><div class="modal-content">
        <h3>Step 2: Company Info</h3><br>
        <input type="text" id="reg-cname" placeholder="Company Name">
        <input type="text" id="reg-phone" placeholder="Contact Number">
        <button onclick="registerCompany()">Create Account</button>
    </div></div>

    <div id="job-modal" class="modal"><div class="modal-content">
        <span onclick="closeModals()" style="float:right; cursor:pointer;">✖</span>
        <h3 id="modal-title">Post New Job</h3><br>
        <input type="hidden" id="j-id">
        <input type="text" id="j-title" placeholder="Job Title">
        <input type="text" id="j-salary" placeholder="Salary">
        <input type="number" id="j-vacancy" placeholder="Vacancies">
        <textarea id="j-desc" placeholder="Job Description"></textarea>
        <button onclick="saveJob()">Submit Job</button>
    </div></div>

    <!-- Dashboard -->
    <div class="sidebar" id="sidebar" style="display:none;">
        <div class="sidebar-header">SwipeJobs</div>
        <div class="nav-item active-tab" onclick="switchTab('jobs')" id="tab-jobs"><i class="fa-solid fa-briefcase"></i> <span>Jobs</span></div>
        <div class="nav-item" onclick="switchTab('applicants')" id="tab-applicants"><i class="fa-solid fa-users"></i> <span>Applicants</span></div>
        <div class="nav-item" onclick="switchTab('profile')" id="tab-profile"><i class="fa-solid fa-gear"></i> <span>Profile</span></div>
    </div>

    <div class="main-content" id="dashboard" style="display:none;">
        <div id="view-jobs" class="screen active">
            <div style="display:flex; justify-content:space-between;"><h2>My Jobs</h2>
            <button onclick="openPostJobModal()" style="width:auto; padding:10px;">+ Post Job</button></div><br>
            <div id="job-list"></div>
        </div>
        <div id="view-applicants" class="screen">
            <h2>Applications</h2><br>
            <div id="applicant-list"></div>
        </div>
        <div id="view-profile" class="screen">
            <h2>Company Profile</h2><br>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="help-fab" onclick="alert('Contact: 9876543210 | Email: support@swipejobs.com')"><i class="fa-solid fa-headset"></i></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDWYjuwSKnaK8S_S7Af1kQPE11ZrPH8OhU",
        authDomain: "swipejobs-a5317.firebaseapp.com",
        projectId: "swipejobs-a5317",
        storageBucket: "swipejobs-a5317.firebasestorage.app",
        messagingSenderId: "916910145870",
        appId: "1:916910145870:web:7afb0e09cba45405d0de1f"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth(); const db = firebase.firestore();

    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function switchTab(t) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
    }

    function openRegStep1() { document.getElementById('reg-step1').style.display = 'flex'; }
    function goToRegStep2() { document.getElementById('reg-step1').style.display = 'none'; document.getElementById('reg-step2').style.display = 'flex'; }

    function registerCompany() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const cname = document.getElementById('reg-cname').value;
        auth.createUserWithEmailAndPassword(email, pass).then(cred => {
            db.collection('companies').doc(cred.user.uid).set({ email, cname });
            alert("Registered!"); closeModals();
        });
    }

    function loginCompany() {
        auth.signInWithEmailAndPassword(document.getElementById('c-login-email').value, document.getElementById('c-login-pass').value);
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'flex';
            loadJobs(); loadApplicants();
        }
    });

    function openPostJobModal() { document.getElementById('job-modal').style.display = 'flex'; }

    function saveJob() {
        const user = auth.currentUser;
        if(!user) return;
        const data = {
            companyId: user.uid,
            companyEmail: user.email,
            title: document.getElementById('j-title').value,
            salary: document.getElementById('j-salary').value,
            vacancy: document.getElementById('j-vacancy').value,
            desc: document.getElementById('j-desc').value,
            status: 'Pending Review'
        };
        db.collection('jobs').add(data).then(() => {
            alert("Job Submitted! Pending Admin Approval.");
            closeModals();
        });
    }

    function loadJobs() {
        db.collection('jobs').where('companyId', '==', auth.currentUser.uid).onSnapshot(snap => {
            const list = document.getElementById('job-list'); list.innerHTML = '';
            snap.forEach(doc => {
                const j = doc.data();
                list.innerHTML += `<div class="card"><h3>${j.title}</h3><p>Status: ${j.status}</p></div>`;
            });
        });
    }

    function loadApplicants() {
        db.collection('applications').where('companyId', '==', auth.currentUser.uid).onSnapshot(snap => {
            const list = document.getElementById('applicant-list'); list.innerHTML = '';
            snap.forEach(doc => {
                const a = doc.data();
                list.innerHTML += `<div class="card"><h3>${a.jobTitle}</h3><p>Candidate: ${a.candidateId}</p>
                <button onclick="db.collection('applications').doc('${doc.id}').update({status:'Shortlisted'})">Shortlist</button></div>`;
            });
        });
    }

    function logout() { auth.signOut(); location.reload(); }
</script>
</body>
</html>
