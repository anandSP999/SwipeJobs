<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c-primary: #0056b3; --c-bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--c-bg); display: flex; height: 100vh; }
        
        /* Layout */
        .sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; background: #1a252f; }
        .nav-item { padding: 20px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--c-primary); }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--c-primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Auth Screen */
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; width: 100%; position: fixed; z-index: 1000; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; }
            .sidebar-header { display: none; }
            .nav-item { flex: 1; text-align: center; padding: 15px 5px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <div style="width: 350px; padding: 30px; border: 1px solid #ddd; border-radius: 10px;">
            <h2 style="text-align: center;">Employer Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background: #333;">Create New Account</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar" style="display: none;">
        <div class="sidebar-header">Employer Portal</div>
        <div class="nav-item active" onclick="show('jobs')">My Jobs</div>
        <div class="nav-item" onclick="show('applicants')">Applicants</div>
        <div class="nav-item" onclick="logout()">Logout</div>
    </div>

    <!-- Content -->
    <div class="main-content" id="main" style="display: none;">
        <div id="jobs" class="screen active">
            <h2>Post a Job</h2>
            <div class="card">
                <input type="text" id="j-title" placeholder="Job Title">
                <input type="text" id="j-salary" placeholder="Salary">
                <input type="number" id="j-vacancy" placeholder="Vacancies">
                <textarea id="j-desc" placeholder="Job Description"></textarea>
                <button onclick="postJob()">Submit Job for Approval</button>
            </div>
            <h2>My Jobs</h2>
            <div id="job-list"></div>
        </div>
        
        <div id="applicants" class="screen">
            <h2>Applicants</h2>
            <div id="app-list"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDWYjuwSKnaK8S_S7Af1kQPE11ZrPH8OhU",
        authDomain: "swipejobs-a5317.firebaseapp.com",
        projectId: "swipejobs-a5317",
        storageBucket: "swipejobs-a5317.firebasestorage.app",
        messagingSenderId: "916910145870",
        appId: "1:916910145870:web:7afb0e09cba45405d0de1f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function register() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Created! Now Login.")).catch(e => alert(e.message));
    }

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
    }

    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main').style.display = 'block';
            loadData(user.uid);
        }
    });

    async function postJob() {
        const user = auth.currentUser;
        try {
            await db.collection('jobs').add({
                companyId: user.uid,
                companyEmail: user.email,
                title: document.getElementById('j-title').value,
                salary: document.getElementById('j-salary').value,
                vacancy: document.getElementById('j-vacancy').value,
                desc: document.getElementById('j-desc').value,
                status: 'Pending Review',
                postedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Job submitted successfully!");
            document.getElementById('j-title').value = '';
        } catch(e) { alert("Error: " + e.message); }
    }

    function loadData(uid) {
        db.collection('jobs').where('companyId', '==', uid).onSnapshot(snap => {
            const list = document.getElementById('job-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const j = doc.data();
                list.innerHTML += `<div class="card"><h3>${j.title}</h3><p>Status: <b>${j.status}</b></p></div>`;
            });
        });
    }
</script>
</body>
</html>
